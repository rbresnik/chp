services:
  - type: web
    name: chp-flask-app
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn --bind 0.0.0.0:$PORT --workers 2 --threads 4 --timeout 120 app:app
    envVars:
      - key: WEB_CONCURRENCY
        value: "2"
      - key: OPENAI_API_KEY
        sync: false
