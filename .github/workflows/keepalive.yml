name: Keep Render Awake

on:
  schedule:
    - cron: "*/10 * * * *"
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping health endpoint
        run: |
          curl --fail --silent --show-error "$URL"
        env:
          URL: ${{ secrets.RENDER_HEALTHCHECK_URL }}
